name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint PR title (conventional commits)
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            ci
            test
            refactor
            perf
            build
            revert

      - uses: ./.github/actions/setup-rust

      - uses: taiki-e/install-action@nextest

      - run: cargo fmt --all -- --check

      - run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests (nextest)
        run: cargo nextest run --workspace

      # nextest does not run doctests (https://github.com/nextest-rs/nextest/issues/16)
      - name: Doctests
        run: cargo test --workspace --doc

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@nextest
      - name: Miri (nextest, parallel)
        run: |
          yes | cargo miri setup
          # -j 2 matches typical ubuntu-latest vCPU without spawning too many Miri processes
          cargo miri nextest run --workspace -j 2
      - name: Miri doctests
        run: cargo miri test --workspace --doc

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@cargo-llvm-cov
      # `llvm-cov nextest` does not support --doctests; keep lib+integration+doctest coverage here.
      - name: Coverage (HTML + doctests)
        run: cargo llvm-cov test --workspace --html --doctests
      - uses: actions/upload-artifact@v5
        with:
          name: coverage-html
          path: target/llvm-cov/html
