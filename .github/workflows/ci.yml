name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            ci
            test
            refactor
            perf
            build
            revert

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests (nextest)
        run: cargo nextest run --workspace
      # nextest does not run doctests (https://github.com/nextest-rs/nextest/issues/16)
      - name: Doctests
        run: cargo test --workspace --doc

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - name: Miri (nextest, parallel)
        run: |
          yes | cargo miri setup
          # -j 2 matches typical ubuntu-latest vCPU without spawning too many Miri processes
          cargo miri nextest run --workspace -j 2
      - name: Miri doctests
        run: cargo miri test --workspace --doc

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@cargo-llvm-cov
      # `llvm-cov nextest` does not support --doctests; keep lib+integration+doctest coverage here.
      - name: Coverage (HTML + doctests)
        run: cargo llvm-cov test --workspace --html --doctests
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: target/llvm-cov/html

  # Single required status check for branch protection. Individual jobs can be
  # added/removed without touching protection rules as long as this gate stays.
  ci:
    if: always()
    needs: [pr-title, lint-and-test, miri, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs succeeded
        run: |
          set -euo pipefail
          for r in \
            "${{ needs.pr-title.result }}" \
            "${{ needs.lint-and-test.result }}" \
            "${{ needs.miri.result }}" \
            "${{ needs.coverage.result }}"
          do
            case "$r" in
              success|skipped) ;;
              *) echo "a required job reported: $r"; exit 1 ;;
            esac
          done
