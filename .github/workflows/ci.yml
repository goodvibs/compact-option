name: CI

on:
  push:
  pull_request:

env:
  RUSTFLAGS: -Dwarnings

jobs:
  # Toolchain channel and components come only from rust-toolchain.toml at the repo root.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - run: cargo test --workspace

      - name: Miri (compact-option)
        run: |
          yes | cargo miri setup
          cargo miri test -p compact-option

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage (HTML + doctests)
        run: cargo llvm-cov test --workspace --html --doctests

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html
