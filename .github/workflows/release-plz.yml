name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Publishes unpublished packages to crates.io and cuts vX.Y.Z tags.
  # Runs after a Release PR is merged (branch protection on main ensures CI was green).
  release-plz-release:
    if: github.repository_owner == 'goodvibs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens or updates the "Release PR": bumps versions (including the
  # [workspace.dependencies] self-ref), updates CHANGELOGs, and keeps Cargo.lock in sync.
  release-plz-pr:
    if: github.repository_owner == 'goodvibs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
